<h1>Firmware Builds</h1>
<p class="subtitle">Files are loaded directly from this repository via the GitHub API.</p>

<div id="firmware-root">
  <p class="loading">Loading firmware files...</p>
</div>

<script>
(function () {
  const REPO = 'cisien/cisien.github.io';
  const FIRMWARE_PATH = 'firmware';
  const API = 'https://api.github.com';
  const root = document.getElementById('firmware-root');

  function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0) + ' ' + units[i];
  }

  function fileIcon() {
    return '<svg class="file-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>';
  }

  async function fetchContents(path) {
    const res = await fetch(`${API}/repos/${REPO}/contents/${path}`);
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    return res.json();
  }

  // Recursively collect the full tree into a flat list of {path, name, size, download_url}
  async function collectFiles(path) {
    const items = await fetchContents(path);
    const results = [];

    const dirs = items.filter(i => i.type === 'dir').sort((a, b) => a.name.localeCompare(b.name));
    const files = items.filter(i => i.type === 'file' && !i.name.startsWith('.')).sort((a, b) => a.name.localeCompare(b.name));

    for (const f of files) {
      results.push({ path: f.path, name: f.name, size: f.size, download_url: f.download_url });
    }

    // Fetch all subdirectories in parallel
    const subResults = await Promise.all(dirs.map(d => collectFiles(d.path)));
    for (const sub of subResults) {
      results.push(...sub);
    }

    return results;
  }

  // Group files by their directory relative to firmware/
  function groupByDir(files, basePath) {
    const groups = new Map();
    for (const f of files) {
      const rel = f.path.slice(basePath.length + 1); // strip "firmware/"
      const lastSlash = rel.lastIndexOf('/');
      const dir = lastSlash === -1 ? '' : rel.slice(0, lastSlash);
      if (!groups.has(dir)) groups.set(dir, []);
      groups.get(dir).push(f);
    }
    return groups;
  }

  function fileItem(f) {
    return `<li class="file-item">
      <div class="file-info">
        ${fileIcon()}
        <span class="file-name">${f.name}</span>
      </div>
      <span class="file-size">${formatSize(f.size)}</span>
      <a href="${f.download_url}" class="file-download" download>Download</a>
    </li>`;
  }

  async function render() {
    const files = await collectFiles(FIRMWARE_PATH);

    if (files.length === 0) {
      root.innerHTML = '<div class="empty-state"><p>No firmware files yet.</p><p style="margin-top:0.5rem;font-size:0.85rem;">Add binary files to the <code>firmware/</code> directory in the repository.</p></div>';
      return;
    }

    const groups = groupByDir(files, FIRMWARE_PATH);
    // Sort directory keys: root first, then alphabetical
    const sortedKeys = [...groups.keys()].sort((a, b) => {
      if (a === '') return -1;
      if (b === '') return 1;
      return a.localeCompare(b);
    });

    let html = '';
    for (const dir of sortedKeys) {
      const dirFiles = groups.get(dir);
      if (dir !== '') {
        html += `<h3 class="dir-heading">${dir}/</h3>`;
      }
      html += `<ul class="file-list">${dirFiles.map(f => fileItem(f)).join('')}</ul>`;
    }

    root.innerHTML = html;
  }

  render().catch(err => {
    root.innerHTML = `<div class="empty-state"><p>Could not load firmware listing.</p><p style="margin-top:0.5rem;font-size:0.85rem;">${err.message}</p></div>`;
  });
})();
</script>
